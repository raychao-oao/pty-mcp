name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          mkdir -p dist

          # pty-mcp
          GOOS=darwin GOARCH=amd64  go build -o dist/pty-mcp-darwin-amd64 .
          GOOS=darwin GOARCH=arm64  go build -o dist/pty-mcp-darwin-arm64 .
          GOOS=linux  GOARCH=amd64  go build -o dist/pty-mcp-linux-amd64 .
          GOOS=linux  GOARCH=arm64  go build -o dist/pty-mcp-linux-arm64 .

          # ai-tmux
          GOOS=darwin GOARCH=amd64  go build -o dist/ai-tmux-darwin-amd64 ./cmd/ai-tmux/
          GOOS=darwin GOARCH=arm64  go build -o dist/ai-tmux-darwin-arm64 ./cmd/ai-tmux/
          GOOS=linux  GOARCH=amd64  go build -o dist/ai-tmux-linux-amd64 ./cmd/ai-tmux/
          GOOS=linux  GOARCH=arm64  go build -o dist/ai-tmux-linux-arm64 ./cmd/ai-tmux/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
