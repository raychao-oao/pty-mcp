name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all platforms
        run: |
          VERSION="${GITHUB_REF_NAME}"
          LDFLAGS="-X main.version=${VERSION}"

          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o pty-mcp-darwin-arm64 .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pty-mcp-darwin-amd64 .
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o pty-mcp-linux-amd64  .
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o pty-mcp-linux-arm64  .

          GOOS=darwin  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ai-tmux-darwin-arm64 ./cmd/ai-tmux/
          GOOS=darwin  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ai-tmux-darwin-amd64 ./cmd/ai-tmux/
          GOOS=linux   GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o ai-tmux-linux-amd64  ./cmd/ai-tmux/
          GOOS=linux   GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o ai-tmux-linux-arm64  ./cmd/ai-tmux/

      - name: Generate checksums
        run: sha256sum pty-mcp-* ai-tmux-* > SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pty-mcp-darwin-arm64
            pty-mcp-darwin-amd64
            pty-mcp-linux-amd64
            pty-mcp-linux-arm64
            ai-tmux-darwin-arm64
            ai-tmux-darwin-amd64
            ai-tmux-linux-amd64
            ai-tmux-linux-arm64
            SHA256SUMS
